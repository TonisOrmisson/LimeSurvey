build:
    tests:
        override:
            - true

    nodes:
        tests: true
filter:
filter:
    paths: ["application/*"]
    excluded_paths:
        - 'application/views/*'
        - 'application/helpers/adodb/*'
        - 'application/helpers/Zend/*'
        - 'application/libraries/admin/http/*'
        - 'application/libraries/admin/Services_JSON.php'
        - 'application/libraries/admin/pclzip/*'
        - 'application/extensions/*'
        - 'application/third_party/*'
        - 'application/tests/*'
    dependency_paths:
        - 'framework/'
        - 'application/helpers/adodb/*'
        - 'application/libraries/admin/http/*'
        - 'application/libraries/admin/pclzip/*'
        - 'application/extensions/*'
        - 'application/tests/*'
        - 'application/third_party/*'
        - 'third_party/*'
        - 'installer/*'
        - 'application/helpers/Zend/*'        
        - 'application/libraries/admin/Services_JSON.php'
checks:
    javascript: true 
    php:
        code_rating: true
        duplication: true
        one_class_per_file: true
tools:
    php_cs_fixer:
        enabled:              true
        config:
            level:            psr2
            lowercase_keywords: false
coding_style:
    php:    
        braces:
            classes_functions:
                class: new-line
                function: new-line
                closure: new-line
            if:
                opening: end-of-line
            for:
                opening: end-of-line
            while:
                opening: end-of-line
            do_while:
                opening: end-of-line
            switch:
                opening: end-of-line
            try:
                opening: end-of-line
        upper_lower_casing:
            constants:
                true_false_null: lower
                